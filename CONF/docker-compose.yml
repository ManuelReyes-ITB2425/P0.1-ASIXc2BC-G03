version: '3.8'

services:
  # --- PROXY (S1) ---
  s1-proxy:
    image: nginx:alpine
    container_name: s1_proxy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      # Montamos configuración de proxy
      - ./proxy/nginx.conf:/etc/nginx/conf.d/default.conf
      - ./proxy/certs:/etc/nginx/certs:ro
      - ./proxy/snippets:/etc/nginx/snippets:ro
    depends_on:
      - s2-app
      - s3-app
    networks:
      - extagram-net

  # --- BACKEND (S2, S3, S4) ---
  s2-app:
    image: php:fpm-alpine
    container_name: s2_app
    volumes:
      # Montamos el código PHP para que lo ejecute
      - ./src/html:/var/www/html
    networks:
      - extagram-net
    command: /bin/sh -c "docker-php-ext-install mysqli && php-fpm"
  s3-app:
    image: php:fpm-alpine
    container_name: s3_app
    volumes:
      - ./src/html:/var/www/html
    networks:
      - extagram-net
    command: /bin/sh -c "docker-php-ext-install mysqli && php-fpm"
  s4-upload:
    image: php:fpm-alpine
    container_name: s4_upload
    volumes:
      - ./src/html:/var/www/html
      # Volumen compartido para guardar fotos
      - ./uploads:/var/www/html/uploads
    networks:
      - extagram-net
    command: /bin/sh -c "docker-php-ext-install mysqli && php-fpm"

# --- DATABASE (S7) ---
  s7-db:
    image: mariadb:10.6
    container_name: s7_db
    environment:
      MARIADB_ROOT_PASSWORD: ${DB_ROOT_PASS}
      MARIADB_DATABASE: ${DB_DATABASE}
      MARIADB_USER: ${DB_USER}
      MARIADB_PASSWORD: ${DB_PASSWORD}
    volumes:
      - ./db/init:/docker-entrypoint-initdb.d
    networks:
      - extagram-net
    # Hardening: Aseguramos que reinicie si hay un fallo
    restart: always

  # --- STATIC & IMAGES (S5, S6) ---
  s5-images:
    image: nginx:alpine
    container_name: s5_images
    volumes:
      # Sirve las fotos que subió S4
      - ./uploads:/usr/share/nginx/html/uploads
    networks:
      - extagram-net

  s6-static:   # Nombre del servicio
    image: nginx:alpine
    container_name: s6_static  # <--- ESTA LÍNEA ES CLAVE
    volumes:
      - ./static:/usr/share/nginx/html
      - ./uploads:/usr/share/nginx/html/uploads
    networks:
      - extagram-net

  # --- INICIO BLOQUE MONITORIZACIÓN ---
  cadvisor:
    image: gcr.io/cadvisor/cadvisor:latest
    container_name: cadvisor
    # cadvisor no necesita puerto expuesto a internet, Prometheus lo lee internamente
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:rw
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
    networks:
      - extagram-net

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    depends_on:
      - cadvisor
    networks:
      - extagram-net

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    depends_on:
      - prometheus
    networks:
      - extagram-net
  # --- FIN BLOQUE MONITORIZACIÓN ---

networks:
  extagram-net:
    driver: bridge

    
